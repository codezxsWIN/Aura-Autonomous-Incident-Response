name: aura-cogops

services:
  aura-api:
    build:
      context: ./backend
    image: aura-cogops-api:local
    environment:
      AURA_ENV: docker
      AURA_HOST: 0.0.0.0
      AURA_PORT: 8000
      AURA_ENABLE_EXTERNAL_SERVICES: "true"
      AURA_DEMO_STEP_DELAY_MS: ${AURA_DEMO_STEP_DELAY_MS:-55}
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-aura-demo-password}
      MOCK_INFRA_URL: http://mock-infra:8001
      MOCK_INFRA_API_KEY: ${MOCK_INFRA_API_KEY:-aura-local-demo}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-aura-cogops-v2}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      mock-infra:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aura-control

  mock-infra:
    build:
      context: ./backend
    image: aura-cogops-api:local
    command:
      - uvicorn
      - app.mock_infra:app
      - --host
      - 0.0.0.0
      - --port
      - "8001"
    environment:
      MOCK_INFRA_API_KEY: ${MOCK_INFRA_API_KEY:-aura-local-demo}
    expose:
      - "8001"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2)
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - aura-control

  redis:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - aura-control

  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-aura-demo-password}
      AURA_HEALTH_PASSWORD: ${NEO4J_PASSWORD:-aura-demo-password}
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test:
        - CMD-SHELL
        - cypher-shell -u neo4j -p "$$AURA_HEALTH_PASSWORD" "RETURN 1;" >/dev/null 2>&1 || exit 1
      interval: 8s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped
    networks:
      - aura-control

volumes:
  redis-data:
  neo4j-data:
  neo4j-logs:

networks:
  aura-control:
    driver: bridge